<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Nao Sato</title><meta property="og:title" content="Nao Sato"><meta property="og:type" content="website"><link rel="preconnect" href="https://embed.music.apple.com"><link rel="preconnect" href="https://open.spotify.com"><style>html,body{margin:0;height:100%}.lb-root,.lb-root *{box-sizing:border-box;}
.lb-root{position:relative;min-height:100%;display:flex;justify-content:center;padding:48px 20px;background-size:cover;background-position:center;background-repeat:no-repeat;font-family:var(--lb-font);color:#1a1a1a;line-height:1.6;}
.lb-overlay{position:absolute;inset:0;z-index:0;pointer-events:none;}
.lb-container{position:relative;z-index:1;width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;}
.lb-avatar{width:120px;height:120px;overflow:hidden;border:3px solid #fff;box-shadow:0 6px 16px rgba(0,0,0,.08);background:#e9ebef;}
.lb-avatar img{width:100%;height:100%;object-fit:cover;display:block;transform-origin:center;}
.lb-name{margin-top:20px;font-size:1.5rem;font-weight:700;text-align:center;color:var(--lb-page-text);}
.lb-bio{margin-top:8px;color:var(--lb-page-text);opacity:.72;font-size:.95rem;text-align:center;max-width:360px;white-space:pre-line;}
.lb-links{margin-top:32px;width:100%;display:flex;flex-direction:column;gap:14px;}
.lb-link{display:flex;align-items:center;gap:14px;width:100%;padding:16px 20px;background:#fff;border:1px solid #e5e7eb;border-radius:var(--lb-radius);color:#1a1a1a;text-decoration:none;font-size:.98rem;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.04);transition:transform .15s,box-shadow .15s,border-color .15s,background .15s;}
.lb-link:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.08);border-color:var(--lb-accent);}
.lb-link:active{transform:translateY(0);}
.lb-link svg{width:22px;height:22px;flex-shrink:0;}
.lb-link span{flex:1;}
.lb-link .lb-chev{color:#6b7280;width:16px;height:16px;}
.lb-root[data-btn="outline"] .lb-link{background:transparent;border:2px solid var(--lb-accent);color:var(--lb-page-text);box-shadow:none;}
.lb-root[data-btn="outline"] .lb-link .lb-chev,.lb-root[data-btn="outline"] .lb-link svg{color:var(--lb-page-text);}
.lb-root[data-btn="solid"] .lb-link{background:var(--lb-accent);border-color:var(--lb-accent);color:#fff;}
.lb-root[data-btn="solid"] .lb-link .lb-chev,.lb-root[data-btn="solid"] .lb-link svg{color:#fff;}
.lb-root[data-btn="glass"] .lb-link{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);color:var(--lb-page-text);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);box-shadow:none;}
.lb-root[data-btn="glass"] .lb-link .lb-chev,.lb-root[data-btn="glass"] .lb-link svg{color:var(--lb-page-text);}
.lb-gallery{width:100%;margin-top:24px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.lb-gallery:empty{display:none;}
.lb-gallery img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:14px;display:block;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.lb-music{width:100%;margin-top:24px;border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04);;background:#efedf7;min-height:80px}
.lb-music:empty{display:none;}
.lb-music iframe{display:block;width:100%;border:0;}
.lb-footer{margin-top:40px;color:var(--lb-page-text);opacity:.6;font-size:.8rem;text-align:center;}
.lb-footer a{color:inherit;text-decoration:underline;}
[data-lb-font="rounded"]{--lb-font:"Hiragino Maru Gothic ProN","Quicksand",system-ui,sans-serif;}
[data-lb-font="serif"]{--lb-font:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;}
[data-lb-font="mono"]{--lb-font:"SF Mono","Menlo","Consolas",monospace;}
:root,[data-lb-font="sans"]{--lb-font:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;}
